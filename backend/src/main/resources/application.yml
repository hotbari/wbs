spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/workforce}
    username: ${DB_USER:workforce}
    password: ${DB_PASS:workforce}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:localhost}    # non-empty default keeps auto-config bean alive in dev
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    test-connection: false          # prevents startup connection check in dev
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:change-me-in-production-must-be-256-bits-long}
  access-token-expiry-ms: 900000       # 15 minutes
  refresh-token-expiry-days: 7

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

server:
  port: 8080

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}

skill-staleness:
  threshold-days: 90
  from-email: ${NUDGE_FROM_EMAIL:noreply@workforce.internal}
