services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: workforce
      POSTGRES_USER: workforce
      POSTGRES_PASSWORD: workforce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workforce"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/workforce
      DB_USER: workforce
      DB_PASS: workforce
      JWT_SECRET: change-me-in-production-must-be-256-bits-long
      CORS_ALLOWED_ORIGIN: http://localhost:3000
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
